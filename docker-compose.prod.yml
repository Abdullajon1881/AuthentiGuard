# ── Production Docker Compose for AuthentiGuard ──────────────
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Differences from dev:
# - Caddy reverse proxy with auto-HTTPS
# - No exposed ports except 80/443
# - No volume mounts for source code (images are self-contained)
# - No MLflow or Flower exposed publicly
# - Production environment variables

networks:
  authentiguard:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  model_cache:

# ── Secrets (file-backed; never committed — see secrets/README.md) ──
# Root credentials are bootstrap/admin only. Backend and worker use a
# dedicated MinIO service account with least-privilege bucket access.
secrets:
  minio_root_user:
    file: ./secrets/minio_root_user
  minio_root_password:
    file: ./secrets/minio_root_password
  s3_app_access_key:
    file: ./secrets/s3_app_access_key
  s3_app_secret_key:
    file: ./secrets/s3_app_secret_key

services:

  # ── Caddy (reverse proxy + auto-HTTPS) ─────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: ag_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - authentiguard

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-authentiguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-authentiguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups:/backups
    networks:
      - authentiguard
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-authentiguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ag_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - authentiguard
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: ag_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    # Credentials sourced from Docker secrets (./secrets/minio_root_*).
    # MinIO supports *_FILE suffixed env vars natively — the value is read
    # from the file path at container startup. No plain-text defaults.
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
    secrets:
      - minio_root_user
      - minio_root_password
    volumes:
      - minio_data:/data
    networks:
      - authentiguard
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: ag_backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-authentiguard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-authentiguard}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      # S3 creds come from Docker secrets, not plain env. config.py reads
      # *_FILE vars and populates AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY.
      AWS_ACCESS_KEY_ID_FILE: /run/secrets/s3_app_access_key
      AWS_SECRET_ACCESS_KEY_FILE: /run/secrets/s3_app_secret_key
      # Outgoing alert webhook (Slack-compatible or generic JSON endpoint).
      # Consumed by app.workers.alerting._post_alert_webhook. MUST be set in
      # .env.production for detector-fallback, high-failure-rate, and
      # queue-depth alerts to reach a human in production.
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    secrets:
      - s3_app_access_key
      - s3_app_secret_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - authentiguard
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Worker (AI Detection) ──────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: runtime
    container_name: ag_worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-authentiguard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-authentiguard}
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID_FILE: /run/secrets/s3_app_access_key
      AWS_SECRET_ACCESS_KEY_FILE: /run/secrets/s3_app_secret_key
      DETECTOR_MODE: ${DETECTOR_MODE:-ml}
      HF_HUB_DOWNLOAD_TIMEOUT: "60"
      TRANSFORMERS_OFFLINE: "1"
      HF_HUB_OFFLINE: "1"
      TOKENIZERS_PARALLELISM: "false"
      # The worker runs app.workers.alerting.check_health on the `text`
      # queue every 60s (scheduled by beat). It reads this URL to post
      # alerts externally; leaving it empty means alerts only land in
      # structlog. Required in production.
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    secrets:
      - s3_app_access_key
      - s3_app_secret_key
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - model_cache:/models
    networks:
      - authentiguard
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping", "--timeout", "10"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  # ── Celery Beat (periodic task scheduler) ────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: runtime
    container_name: ag_beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env.production
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-authentiguard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-authentiguard}
      S3_ENDPOINT_URL: http://minio:9000
      DETECTOR_MODE: heuristic
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - authentiguard
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Celery Flower (internal only — not exposed) ───────────
  flower:
    image: mher/flower:2.0
    container_name: ag_flower
    restart: unless-stopped
    command: celery flower --broker=redis://:${REDIS_PASSWORD}@redis:6379/0
    environment:
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:?FLOWER_PASSWORD is required}
    depends_on:
      - redis
    networks:
      - authentiguard

  # ── Next.js Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_API_URL: https://api.authentiguard.io
    container_name: ag_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.authentiguard.io
    depends_on:
      - backend
    networks:
      - authentiguard
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
