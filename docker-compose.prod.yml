# ── Production Docker Compose for AuthentiGuard ──────────────
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Differences from dev:
# - Caddy reverse proxy with auto-HTTPS
# - No exposed ports except 80/443
# - No volume mounts for source code (images are self-contained)
# - No MLflow or Flower exposed publicly
# - Production environment variables

networks:
  authentiguard:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
  model_cache:

services:

  # ── Caddy (reverse proxy + auto-HTTPS) ─────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: ag_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - authentiguard

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-authentiguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-authentiguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./backups:/backups
    networks:
      - authentiguard
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-authentiguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ag_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - authentiguard
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: ag_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - authentiguard
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: ag_backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-authentiguard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-authentiguard}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - authentiguard
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Worker (AI Detection) ──────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: runtime
    container_name: ag_worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-authentiguard}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-authentiguard}
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - model_cache:/models
    networks:
      - authentiguard
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping", "--timeout", "10"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  # ── Celery Flower (internal only — not exposed) ───────────
  flower:
    image: mher/flower:2.0
    container_name: ag_flower
    restart: unless-stopped
    command: celery flower --broker=redis://:${REDIS_PASSWORD}@redis:6379/0
    environment:
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:?FLOWER_PASSWORD is required}
    depends_on:
      - redis
    networks:
      - authentiguard

  # ── Next.js Frontend ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        NEXT_PUBLIC_API_URL: https://api.authentiguard.io
    container_name: ag_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.authentiguard.io
    depends_on:
      - backend
    networks:
      - authentiguard
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
