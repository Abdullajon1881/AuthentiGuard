name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/authentiguard

jobs:
  # ── Lint & type-check ──────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install ruff mypy
      - run: ruff check .
      - run: mypy . --ignore-missing-imports

  lint-ai:
    name: Lint AI Workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  # ── Tests ──────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage --watchAll=false
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio pytest-cov
      - run: pytest --cov=app --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          APP_SECRET_KEY: test-secret-key-not-for-production
          JWT_SECRET_KEY: test-jwt-key-minimum-32-chars-for-validation-not-prod
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1ub3QtZm9yLXByb2Q=
      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── Docker build check ─────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release to staging (human-in-the-loop rollout) ────────
  #
  # ROLLOUT IS NOT AUTOMATED. This job prepares the release artifacts:
  #
  #   1. alembic upgrade head against the staging DB    (automated)
  #   2. docker build + push container images           (automated)
  #   3. kubectl apply to the cluster                   (MANUAL — see docs/DEPLOY.md)
  #
  # Wiring step 3 would require new architecture (AWS OIDC credentials,
  # ECR push instead of GHCR, kustomize image substitution, kubeconfig
  # generation, rollout-status polling). Until that work is done, step 3
  # is a documented human operator task. The job succeeds when the two
  # automated steps complete; the final step writes a manual-rollout
  # checklist to the Actions run summary so the operator knows exactly
  # what to run next.
  release-staging:
    name: Release to Staging (human-in-the-loop rollout)
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps (for alembic)
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run Alembic migrations (staging DB)
        working-directory: backend
        env:
          # Alembic reads this via backend/alembic/env.py → app.core.config.
          # Must be set in the GitHub "staging" Environment secrets.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # The Settings validator still requires these; provide harmless
          # placeholder values so `get_settings()` loads cleanly during
          # the migration step. Real runtime values live in k8s secrets.
          APP_ENV: staging
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CELERY_BROKER_URL: ${{ secrets.REDIS_URL }}
          CELERY_RESULT_BACKEND: ${{ secrets.REDIS_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Defense-in-depth: the Settings validator will reject this if
          # APP_ENV=production, but staging must never set it either.
          ALLOW_DB_CREATE_ALL: "false"
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error title=Missing DATABASE_URL secret::Set DATABASE_URL in the 'staging' GitHub Environment."
            exit 1
          fi
          alembic upgrade head
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:staging
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:staging
      - name: Manual rollout checklist (staging)
        # This step does NOT apply anything to the cluster.
        # It writes the operator's next-step checklist to the
        # GitHub Actions run summary. Cluster rollout is a human
        # operation — see docs/DEPLOY.md for the full runbook.
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          GIT_SHA: ${{ github.sha }}
        run: |
          {
            echo "## Staging release artifacts ready — MANUAL ROLLOUT REQUIRED"
            echo
            echo "Automated steps completed:"
            echo "- [x] Alembic migrations (\`alembic upgrade head\` against staging DB)"
            echo "- [x] Backend image pushed: \`${REGISTRY}/${IMAGE_PREFIX}-backend:staging\`"
            echo "- [x] Frontend image pushed: \`${REGISTRY}/${IMAGE_PREFIX}-frontend:staging\`"
            echo
            echo "**Cluster rollout is NOT automated.** An operator must run:"
            echo
            echo '```bash'
            echo "# See docs/DEPLOY.md for the full runbook, including prerequisites"
            echo "# (aws eks update-kubeconfig, kustomize image substitution, etc.)."
            echo "kubectl -n authentiguard rollout restart deploy/api deploy/worker-cpu deploy/frontend"
            echo "kubectl -n authentiguard rollout status  deploy/api --timeout=5m"
            echo "kubectl -n authentiguard rollout status  deploy/worker-cpu --timeout=5m"
            echo "kubectl -n authentiguard rollout status  deploy/frontend --timeout=5m"
            echo '```'
            echo
            echo "Rollback: \`kubectl -n authentiguard rollout undo deploy/<name>\`"
            echo
            echo "Commit: \`${GIT_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Manual rollout required::Artifacts prepared. See the run summary and docs/DEPLOY.md for the operator checklist."

  # ── Release to production (human-in-the-loop rollout) ─────
  #
  # ROLLOUT IS NOT AUTOMATED. Same structure as release-staging.
  # See docs/DEPLOY.md for the operator runbook.
  release-production:
    name: Release to Production (human-in-the-loop rollout)
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps (for alembic)
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run Alembic migrations (production DB)
        working-directory: backend
        env:
          # REQUIRED: set in the "production" GitHub Environment secrets.
          # Point at the production read/write endpoint. Migrations run
          # BEFORE image push so a bad migration never ships code.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_ENV: production
          APP_SECRET_KEY: ${{ secrets.APP_SECRET_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          CELERY_BROKER_URL: ${{ secrets.REDIS_URL }}
          CELERY_RESULT_BACKEND: ${{ secrets.REDIS_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # MUST stay false in production — the Settings validator will
          # reject the startup if this is ever set to "true".
          ALLOW_DB_CREATE_ALL: "false"
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error title=Missing DATABASE_URL secret::Set DATABASE_URL in the 'production' GitHub Environment."
            exit 1
          fi
          echo "Running alembic upgrade head against production DB..."
          alembic upgrade head
          echo "Alembic migrations complete."
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
      - name: Manual rollout checklist (production)
        # This step does NOT apply anything to the cluster.
        # It writes the operator's next-step checklist to the
        # GitHub Actions run summary. Production rollout is a human
        # operation — see docs/DEPLOY.md for the full runbook.
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          GIT_SHA: ${{ github.sha }}
        run: |
          {
            echo "## Production release artifacts ready — MANUAL ROLLOUT REQUIRED"
            echo
            echo "Automated steps completed:"
            echo "- [x] Alembic migrations (\`alembic upgrade head\` against production DB)"
            echo "- [x] Backend image pushed: \`${REGISTRY}/${IMAGE_PREFIX}-backend:latest\` (+ \`${GIT_SHA}\`)"
            echo "- [x] Frontend image pushed: \`${REGISTRY}/${IMAGE_PREFIX}-frontend:latest\` (+ \`${GIT_SHA}\`)"
            echo
            echo "**Cluster rollout is NOT automated.** An operator must run:"
            echo
            echo '```bash'
            echo "# 1. Prerequisites (see docs/DEPLOY.md \"Operator prerequisites\")"
            echo "aws eks update-kubeconfig --name authentiguard-prod --region us-east-1"
            echo
            echo "# 2. Confirm migrations landed before code (already done by CI, but verify)"
            echo "kubectl -n authentiguard run --rm -it --restart=Never alembic-check \\"
            echo "  --image=\${REGISTRY}/${IMAGE_PREFIX}-backend:${GIT_SHA} -- \\"
            echo "  alembic current"
            echo
            echo "# 3. Roll out the new image"
            echo "kubectl -n authentiguard set image deploy/api       api=\${REGISTRY}/${IMAGE_PREFIX}-backend:${GIT_SHA}"
            echo "kubectl -n authentiguard set image deploy/worker-cpu worker=\${REGISTRY}/${IMAGE_PREFIX}-backend:${GIT_SHA}"
            echo "kubectl -n authentiguard set image deploy/frontend  frontend=\${REGISTRY}/${IMAGE_PREFIX}-frontend:${GIT_SHA}"
            echo
            echo "# 4. Wait for rollouts"
            echo "kubectl -n authentiguard rollout status deploy/api         --timeout=10m"
            echo "kubectl -n authentiguard rollout status deploy/worker-cpu  --timeout=10m"
            echo "kubectl -n authentiguard rollout status deploy/frontend    --timeout=10m"
            echo '```'
            echo
            echo "**Rollback** (if any rollout fails):"
            echo '```bash'
            echo "kubectl -n authentiguard rollout undo deploy/api"
            echo "kubectl -n authentiguard rollout undo deploy/worker-cpu"
            echo "kubectl -n authentiguard rollout undo deploy/frontend"
            echo '```'
            echo
            echo "Commit: \`${GIT_SHA}\`"
            echo
            echo "See \`docs/DEPLOY.md\` for the full runbook, pre-rollout checklist, and post-rollout smoke tests."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Manual rollout required::Production artifacts prepared. See the run summary and docs/DEPLOY.md for the operator checklist."
